<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Profile - Qlinik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',
                        secondary: '#10B981',
                        accent: '#8B5CF6',
                        dark: '#1F2937',
                        light: '#F3F4F6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        .tab-btn.active { border-color: #2563EB; color: #2563EB; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .card-depth { border: 1px solid #F1F5F9; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); transition: all 0.3s; }
        .card-depth:hover { border-color: #2563EB33; transform: translateY(-4px); }
    </style>
</head>
<body class="bg-slate-50 text-dark font-sans overflow-x-hidden pt-16">

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md border-b border-light h-16 flex items-center px-6">
        <a href="search.html" class="p-2 hover:bg-slate-100 rounded-full transition"><i data-lucide="arrow-left" class="w-6 h-6"></i></a>
        <h1 class="ml-4 font-heading font-black text-xl">Doctor Profile</h1>
    </header>

    <main class="container mx-auto max-w-5xl px-6 py-12 lg:py-24 space-y-12">
        
        <!-- Profile Top Area -->
        <div class="bg-white rounded-[4rem] p-10 md:p-16 border border-light shadow-2xl shadow-slate-200/40 relative overflow-hidden">
            <div class="relative z-10 flex flex-col md:flex-row items-center md:items-start gap-12">
                <div class="w-48 h-48 bg-slate-50 rounded-[3rem] border-4 border-white shadow-xl overflow-hidden shrink-0">
                    <img id="doc-avatar" src="" class="hidden w-full h-full object-cover">
                    <div class="skeleton w-full h-full"></div>
                </div>

                <div class="flex-1 space-y-6 text-center md:text-left">
                    <div class="space-y-2">
                        <div class="flex flex-wrap justify-center md:justify-start items-center gap-4">
                            <span class="px-4 py-1.5 bg-secondary/10 text-secondary rounded-full text-[10px] font-black uppercase tracking-widest">Verified Specialist</span>
                            <div class="flex items-center gap-1.5 text-orange-400">
                                <i data-lucide="star" class="w-4 h-4 fill-current"></i>
                                <span id="doc-rating" class="text-sm font-black text-slate-900">--</span>
                            </div>
                        </div>
                        <h2 id="doc-name-h2" class="text-4xl md:text-6xl font-heading font-black text-slate-900 tracking-tight leading-[1] mt-4">Loading Dr...</h2>
                        <p id="doc-spec" class="text-lg md:text-xl font-bold text-primary uppercase tracking-tight">--</p>
                    </div>

                    <div class="flex flex-wrap justify-center md:justify-start items-center gap-8 pt-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-primary/5 text-primary rounded-xl flex items-center justify-center">
                                <i data-lucide="user-check" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Experience</p>
                                <p class="text-sm font-black text-slate-900">12+ Years</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-secondary/5 text-secondary rounded-xl flex items-center justify-center">
                                <i data-lucide="map-pin" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Main Hub</p>
                                <p id="main-city" class="text-sm font-black text-slate-900">--</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Abstract background -->
            <i data-lucide="activity" class="absolute -right-12 -top-12 w-48 h-48 text-slate-50 rotate-12 -z-0"></i>
        </div>

        <!-- Tabbed Navigation -->
        <div class="bg-white rounded-[3rem] border border-light p-4 shadow-sm flex items-center justify-center gap-4">
            <button class="tab-btn active px-10 py-4 border-b-4 border-transparent font-black uppercase text-[10px] tracking-[0.2em] transition-all" data-tab="about">About</button>
            <button class="tab-btn px-10 py-4 border-b-4 border-transparent font-black uppercase text-[10px] tracking-[0.2em] transition-all" data-tab="clinics">Practicing Venues</button>
            <button class="tab-btn px-10 py-4 border-b-4 border-transparent font-black uppercase text-[10px] tracking-[0.2em] transition-all" data-tab="reviews">Patient Reviews</button>
        </div>

        <!-- Tab Contents -->
        <div class="space-y-12">
            <!-- About Tab -->
            <div id="tab-about" class="tab-content active space-y-12">
                <div class="bg-white p-10 md:p-16 rounded-[4rem] border border-light shadow-sm space-y-8">
                    <h3 class="text-3xl font-heading font-black text-slate-900">Professional Biography</h3>
                    <p id="doc-bio" class="text-xl text-slate-500 leading-relaxed font-medium">--</p>
                </div>
            </div>

            <!-- Clinics Tab -->
            <div id="tab-clinics" class="tab-content space-y-12">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10" id="clinics-grid">
                    <!-- Skeletons -->
                    <div class="h-48 skeleton rounded-3xl"></div>
                    <div class="h-48 skeleton rounded-3xl"></div>
                </div>
            </div>

            <!-- Reviews Tab -->
            <div id="tab-reviews" class="tab-content space-y-12">
                <div class="bg-white p-10 md:p-16 rounded-[4rem] border border-light shadow-sm text-center space-y-6">
                    <div class="w-16 h-16 bg-slate-50 text-slate-200 rounded-full flex items-center justify-center mx-auto">
                        <i data-lucide="message-square" class="w-8 h-8"></i>
                    </div>
                    <h4 class="text-2xl font-black text-slate-400">No recent feedback yet.</h4>
                    <p class="text-slate-400 font-bold max-w-sm mx-auto">Verified patient reviews for this specialist will appear here as the clinic queue updates.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- App Script -->
    <script type="module">
        import { dataService } from '../js/services/data-service.js';
        
        lucide.createIcons();
        
        let doctorData = null;

        async function initProfile() {
            const params = new URLSearchParams(window.location.search);
            const docId = params.get('id');

            if (!docId) {
                window.location.href = 'search.html';
                return;
            }

            try {
                const doc = await dataService.getDoctorById(docId);
                doctorData = doc;
                renderProfile(doc);
            } catch (err) {
                console.error(err);
            }
        }

        function renderProfile(doc) {
            document.getElementById('doc-name-h2').innerText = doc.profiles.full_name;
            document.getElementById('doc-spec').innerText = doc.specialization;
            document.getElementById('doc-rating').innerText = doc.rating || '4.5';
            document.getElementById('doc-bio').innerText = doc.bio || `${doc.profiles.full_name} is a committed healthcare specialist with over a decade of experience in providing world-class diagnostic and treatment care to patients.`;
            document.getElementById('main-city').innerText = doc.doctor_clinics?.[0]?.clinics?.city || 'Main Center';

            const avatar = document.getElementById('doc-avatar');
            avatar.src = doc.profiles.avatar_url || 'https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&q=80&w=400';
            avatar.classList.remove('hidden');
            avatar.nextElementSibling.classList.add('hidden'); // Hide skeleton
            
            // Render Clinics
            const grid = document.getElementById('clinics-grid');
            grid.innerHTML = '';
            
            if (!doc.doctor_clinics || doc.doctor_clinics.length === 0) {
                grid.innerHTML = '<p class="text-slate-400 font-bold italic py-10 col-span-2 text-center">No practicing venues linked yet.</p>';
            } else {
                doc.doctor_clinics.forEach(item => {
                    const clinic = item.clinics;
                    const card = `
                    <div class="bg-white p-8 rounded-[3rem] card-depth space-y-6 flex flex-col justify-between group">
                        <div class="space-y-4">
                            <div class="flex items-center gap-4">
                                <div class="w-14 h-14 bg-primary/5 text-primary rounded-2xl flex items-center justify-center">
                                    <i data-lucide="building-2" class="w-6 h-6"></i>
                                </div>
                                <div class="flex-1">
                                    <h4 class="text-xl font-black text-slate-900 group-hover:text-primary transition">${clinic.name}</h4>
                                    <p class="text-xs font-bold text-slate-400">${clinic.address || clinic.city}</p>
                                </div>
                            </div>
                            <div class="pt-4 flex flex-col gap-2">
                                <div class="flex justify-between items-center text-xs font-black uppercase tracking-widest">
                                    <span class="text-slate-400">Queue Wait</span>
                                    <span class="text-secondary">~15-20 m</span>
                                </div>
                                <div class="w-full h-1.5 bg-slate-50 rounded-full overflow-hidden">
                                    <div class="w-1/3 h-full bg-secondary"></div>
                                </div>
                            </div>
                        </div>
                        <a href="booking-flow.html?docId=${doc.id}&clinicId=${clinic.id}" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] text-center shadow-xl shadow-slate-900/10 hover:bg-primary hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3">
                            Join Queue <i data-lucide="zap" class="w-4 h-4 fill-current"></i>
                        </a>
                    </div>`;
                    grid.insertAdjacentHTML('beforeend', card);
                });
            }
            lucide.createIcons();
        }

        // Tab Switching Logic
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
            });
        });

        window.addEventListener('load', initProfile);
    </script>
</body>
</html>
