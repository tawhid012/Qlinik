<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - Qlinik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',
                        secondary: '#10B981',
                        accent: '#8B5CF6',
                        dark: '#1F2937',
                        light: '#F3F4F6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        .ticket-cut { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 75% 100%, 73% 90%, 27% 90%, 25% 100%, 0% 100%); }
        .ticket { border-radius: 40px; background: white; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.1); position: relative; }
        .ticket::after { content: ''; position: absolute; bottom: 25%; left: 0; right: 0; border-top: 2px dashed #F1F5F9; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-slate-50 text-dark font-sans flex flex-col min-h-screen">

    <main class="flex-1 container mx-auto max-w-lg px-6 py-12 flex flex-col items-center justify-center">
        <!-- Success Animation -->
        <div class="mb-10 text-center space-y-4">
            <div class="w-20 h-20 bg-secondary text-white rounded-full flex items-center justify-center mx-auto shadow-2xl shadow-secondary/30">
                <i data-lucide="check" class="w-10 h-10"></i>
            </div>
            <h1 class="text-4xl font-heading font-black text-slate-900 tracking-tight">You're in the Queue!</h1>
            <p class="text-slate-500 font-bold">Successfully joined the clinic waitlist.</p>
        </div>

        <!-- Ticket -->
        <div id="ticket-container" class="w-full ticket p-10 space-y-12 mb-12">
            <!-- Header/Token -->
            <div class="text-center space-y-2">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Your Token Number</p>
                <div id="token-display" class="text-8xl font-heading font-black text-primary leading-tight">--</div>
                <div class="flex items-center justify-center gap-2">
                    <span class="w-2 h-2 bg-secondary rounded-full animate-pulse"></span>
                    <span class="text-sm font-black text-slate-700">Position Secured</span>
                </div>
            </div>

            <!-- Details -->
            <div class="space-y-6 pt-6">
                <!-- Doctor -->
                <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-primary shadow-sm">
                        <i data-lucide="user-plus" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Doctor</p>
                        <p id="doc-name" class="font-black text-slate-900">Dr. Loading...</p>
                    </div>
                </div>

                <!-- Clinic -->
                <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-secondary shadow-sm">
                        <i data-lucide="building-2" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Clinic</p>
                        <p id="clinic-name" class="font-black text-slate-900">Please wait...</p>
                    </div>
                </div>

                <!-- Patient -->
                <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-accent shadow-sm">
                        <i data-lucide="user" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Patient</p>
                        <p id="patient-name" class="font-black text-slate-900">Loading Info...</p>
                    </div>
                </div>
            </div>

            <!-- Ticket Footer Info -->
            <div class="text-center pt-10">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Estimated Arrival</p>
                <p class="text-lg font-black text-slate-900">02:45 PM Today</p>
            </div>
        </div>

        <!-- Actions -->
        <div class="w-full space-y-4">
            <a id="track-link" href="#" class="block w-full py-5 bg-primary text-white rounded-[1.5rem] font-black text-xl text-center shadow-2xl shadow-primary/30 hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3">
                Live Queue Tracker <i data-lucide="zap" class="w-6 h-6 fill-current"></i>
            </a>
            <a href="../index.html" class="block w-full py-5 bg-white text-slate-400 border border-slate-200 rounded-[1.5rem] font-black text-center hover:bg-slate-100 transition-all">
                Back to Home
            </a>
        </div>
    </main>

    <footer class="p-8 text-center">
        <p class="text-slate-400 text-xs font-bold font-heading">Digital Ticket Powered by Qlinik</p>
    </footer>

    <script type="module">
        import { dataService } from '../js/services/data-service.js';
        import { getSupabase } from '../js/supabase-client.js';
        
        lucide.createIcons();
        
        async function loadConfirmation() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookingId = urlParams.get('id');
            
            if (!bookingId) {
                window.location.href = '../index.html';
                return;
            }

            try {
                const supabase = getSupabase();
                const { data, error } = await supabase
                    .from('appointments')
                    .select(`
                        *,
                        doctors (
                            *,
                            profiles:user_id (full_name)
                        ),
                        clinics (*)
                    `)
                    .eq('id', bookingId)
                    .single();

                if (error) throw error;

                document.getElementById('token-display').innerText = String(data.token_number).padStart(2, '0');
                document.getElementById('doc-name').innerText = data.doctors?.profiles?.full_name || 'Assigned Specialist';
                document.getElementById('clinic-name').innerText = data.clinics?.name || 'Main Health Center';
                document.getElementById('patient-name').innerText = data.patient_info?.full_name || 'Patient';
                document.getElementById('track-link').href = `live-queue.html?id=${data.id}`;

            } catch (err) {
                console.error('Confirmation Error:', err);
                document.getElementById('token-display').innerText = 'ER';
            }
        }

        window.addEventListener('load', loadConfirmation);
    </script>
</body>
</html>
